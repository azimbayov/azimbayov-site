[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Root domain — redirect to language based on browser Accept-Language, default to /az/
[[redirects]]
  from = "/"
  to = "/en/"
  status = 302
  conditions = {Language = ["en"]}

[[redirects]]
  from = "/"
  to = "/tr/"
  status = 302
  conditions = {Language = ["tr"]}

[[redirects]]
  from = "/"
  to = "/az/"
  status = 302

# Trailing-slash canonicalization (Astro builds with trailing slashes)
[[redirects]]
  from = "/az"
  to = "/az/"
  status = 301

[[redirects]]
  from = "/en"
  to = "/en/"
  status = 301

[[redirects]]
  from = "/tr"
  to = "/tr/"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
