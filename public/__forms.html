<!--
  Netlify Forms detection at build time.
  Netlify scans static HTML for `data-netlify` forms; the real form on the
  Contact page is inside an Astro component, so we mirror it here as a plain
  static form to guarantee registration. This file is not linked anywhere.
-->
<!doctype html>
<html>
<head><meta charset="utf-8"><title>form-detection</title></head>
<body>
  <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text"  name="name" />
    <input type="email" name="email" />
    <input type="text"  name="service" />
    <textarea name="message"></textarea>
    <input type="text" name="lang" />
    <input type="text" name="bot-field" />
  </form>
</body>
</html>
